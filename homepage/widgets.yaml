---
- search:
    provider: [google, duckduckgo]
    focus: true
    showSearchSuggestions: true
    target: _blank

- glances:
    url: http://home-media-glances:61208
    version: 4
    cpu: true
    mem: true
    cputemp: true
    uptime: true
    disk: /
    label: Server

- resources:
    cpu: true
    memory: true
    cputemp: true
    uptime: true
    disk:
      - /stats/data
      - /stats/configs
    refresh: 3000
    label: Host

- openmeteo:
    label: Minsk, Belarus
    timezone: Europe/Minsk
    latitude: 53.9045
    longitude: 27.5615
    units: metric
    cache: 5
    forecast: 3
